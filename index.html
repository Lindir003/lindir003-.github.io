<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子建的个人网站</title>
  <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/gradio.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .profile {
      text-align: center;
      padding: 30px;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      color: white;
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #2d3748;
    }

    .title {
      font-size: 16px;
      color: #718096;
      margin-bottom: 16px;
    }

    .bio {
      color: #4a5568;
      font-size: 15px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
    }

    .social-link {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #f7fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 20px;
      transition: all 0.3s;
    }

    .social-link:hover {
      background: #667eea;
      color: white;
      transform: translateY(-3px);
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
    }

    .about-list {
      list-style: none;
    }

    .about-list li {
      padding: 12px 0;
      border-bottom: 1px solid #edf2f7;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .about-list li:last-child {
      border-bottom: none;
    }

    .about-icon {
      font-size: 20px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tag {
      padding: 8px 16px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border: 1px solid rgba(102, 126, 234, 0.25);
      border-radius: 20px;
      font-size: 14px;
      color: #5a67d8;
    }

    .chat-container {
      border-radius: 12px;
      overflow: hidden;
      min-height: 500px;
      background: #f7fafc;
    }

    footer {
      text-align: center;
      color: white;
      padding: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px;
      }
      
      .avatar {
        width: 100px;
        height: 100px;
        font-size: 40px;
      }
      
      .name {
        font-size: 24px;
      }

      .chat-container {
        min-height: 400px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- 个人资料卡片 -->
    <div class="card profile">
      <div class="avatar">👨‍💻</div>
      <h1 class="name">子建</h1>
      <p class="title">开发者 / 学生</p>
      <p class="bio">
        热爱编程与技术创新，专注于Web开发和AI应用。<br>
        欢迎来到我的个人网站！
      </p>
      <div class="social-links">
        <a href="https://github.com/Lindir003" class="social-link" title="GitHub">🐙</a>
        <a href="https://huggingface.co/lindir" class="social-link" title="Hugging Face">🤗</a>
        <a href="mailto:lindir003@example.com" class="social-link" title="Email">📧</a>
      </div>
    </div>

    <!-- 关于我 -->
    <div class="card">
      <h2 class="section-title">关于我</h2>
      <ul class="about-list">
        <li>
          <span class="about-icon">🎓</span>
          <div>
            <strong>教育背景</strong>
            <p>计算机科学专业学生</p>
          </div>
        </li>
        <li>
          <span class="about-icon">💻</span>
          <div>
            <strong>技术方向</strong>
            <p>Web开发 / 机器学习 / 前后端开发</p>
          </div>
        </li>
        <li>
          <span class="about-icon">🌐</span>
          <div>
            <strong>个人项目</strong>
            <p>GitHub: github.com/Lindir003</p>
          </div>
        </li>
      </ul>
    </div>

    <!-- 技能 -->
    <div class="card">
      <h2 class="section-title">技能</h2>
      <div class="skills">
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">TypeScript</span>
        <span class="skill-tag">React</span>
        <span class="skill-tag">Vue</span>
        <span class="skill-tag">Python</span>
        <span class="skill-tag">Node.js</span>
        <span class="skill-tag">Git</span>
        <span class="skill-tag">AI/ML</span>
      </div>
    </div>

    <!-- AI聊天 -->
    <div class="card">
      <h2 class="section-title">和我聊聊</h2>
      <div class="chat-container">
        <gradio-app src="https://lindir-ye.hf.space"></gradio-app>
      </div>
    </div>
  </div>

  <footer>
    © 2026 子建的个人网站
  </footer>

</body>
</html>
